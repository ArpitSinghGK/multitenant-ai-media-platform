# Local dev topology: API (Control Plane) + Celery worker (dispatch to GPU) + Postgres + Redis.
# GPU inference itself runs on RunPod Serverless — workers here only orchestrate.
services:
  api:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    env_file: .env
    command: celery -A aiplatform.workers.celery_app:celery_app worker --loglevel=INFO
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aiplatform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
